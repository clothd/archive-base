services:
  db:
    image: imresamu/postgis:16-3.5
    platform: linux/arm64
    environment:
      POSTGRES_DB: archive
      POSTGRES_USER: archive
      POSTGRES_PASSWORD: localdev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archive"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app  # hot reload during dev
      - ./scripts:/scripts

  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro

volumes:
  pgdata:
