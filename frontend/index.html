<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArcHive — Sign In</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">Arc<span>Hive</span></div>
      <div class="login-sub">Spatial document management for pipeline construction</div>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@enbridge.com"
            autocomplete="email"
            required
          >
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
        </div>
        <button class="btn" id="submit-btn" type="submit">Sign in</button>
        <div class="error-msg" id="error-msg"></div>
      </form>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
